<html>

<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <style>
    .a-canvas {
      background-color: transparent !important;
    }
  </style>
</head>

<body>
  <a-scene
    webxr= "mode: ar;
    optionalFeatures: hit-test;"
    vr-mode-ui="enterVR: false; enterAR: true"
    renderer= "alpha: true; colorManagement: true;"
    device-orientation-permission-ui="enabled: false"
    background= "transparent: true">

    <a-entity id="ar-viewer" position = "0 0 -1"></a-entity>
  </a-scene>
  
  <script>
  // Das "?" abschneiden und den Modell-url aus der Addresszeile auslesen (alles, was nach dem "?" steht)
        const modelUrl = window.location.search.substring(1);

        //Das Model-Viewer Element über die ID holen
        const viewer = document.getElementById('ar-viewer');

        //Prüfen, ob eine valide Modell-url übergeben wurde
        if (modelUrl && modelUrl.trim() !== "") {
            viewer.setAttribute('gltf-model', modelUrl);
        } else {
            //Fehlermeldung, falls keine URL angegeben wurde
            viewer.style.display = "none";
            const errorDiv = document.createElement('div');
            errorDiv.className = "error-message";
            errorDiv.innerText = "Fehler: Kein 3D-Modell in der URL angegeben!";
            document.body.appendChild(errorDiv);
        }
  </script>
</body>

</html>
