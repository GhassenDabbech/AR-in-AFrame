<html>

<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    /* HTML-Test-Text oben links fixieren */
    #cache-test-text {
      position: absolute;
      top: 10px;
      left: 10px;
      background: red;
      color: white;
      padding: 10px;
      font-family: sans-serif;
      font-weight: bold;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <div id="cache-test-text">VERSION: NEUER AFRAME CODE (TEST 1)</div>

  <a-scene
    xrweb
    webxr="mode: ar; optionalFeatures: hit-test;"
    background="transparent: true">

    <a-text value="Hallo AR! Wenn du das siehst, ist der Code aktuell." position="-1.5 2 -3" color="#000000" width="4"></a-text>

    <a-entity id="ar-viewer" position="0 0 -1"></a-entity>
  </a-scene>
  
  <script>
        const modelUrl = window.location.search.substring(1);
        const viewer = document.getElementById('ar-viewer');

        if (modelUrl && modelUrl.trim() !== "") {
            viewer.setAttribute('gltf-model', modelUrl);
        } else {
            viewer.style.display = "none";
            const errorDiv = document.createElement('div');
            errorDiv.className = "error-message";
            errorDiv.innerText = "Fehler: Kein 3D-Modell in der URL angegeben!";
            document.body.appendChild(errorDiv);
        }
  </script>
</body>

</html>
